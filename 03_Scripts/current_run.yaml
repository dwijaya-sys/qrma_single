# current_run.yaml
# =============================================================================
# QRMA Pipeline — Single Source of Truth for One Patient Run
# Location: 03_Scripts\current_run.yaml
# =============================================================================
# All roles (Operator, Tester, Reviewer) read this file first.
# One file = one active run. Archive previous as 99_Archive\runs\run_[id].yaml
# Paths are relative to project root: F:\TeleTCM_Project\qrma_single\
# =============================================================================

# ── Run identity ──────────────────────────────────────────────────────────────
run_id:       "run_kamiyanti_20260525_final"
run_date:     "2026-05-25"
patient_name: "kamiyanti"

# ── Input ─────────────────────────────────────────────────────────────────────
pdf_file: "Kamiyanti QRMA November.pdf"   # relative to project root

# ── Executables (all in 03_Scripts\) ─────────────────────────────────────────
python_exe:    "python"
csv_exporter:  "03_Scripts\\csv_exporter_v2.py"
json_exporter: "03_Scripts\\json_exporter.py"
mappings_file: "03_Scripts\\mappings.json"

# ── Expected outputs ──────────────────────────────────────────────────────────
output_csv:  "01_Data\\csv\\kamiyanti_2025-11-11.csv"
output_json: "01_Data\\json\\kamiyanti_2025-11-11.json"

# ── Report paths (90_Pipeline_Reports\) ──────────────────────────────────────
operator_report: "90_Pipeline_Reports\\operator\\run_kamiyanti_20260525_operator.md"
tester_report:   "90_Pipeline_Reports\\tester\\run_kamiyanti_20260525_tester.md"
reviewer_report: "90_Pipeline_Reports\\reviewer\\run_kamiyanti_20260525_reviewer.md"
logs_dir:        "90_Pipeline_Reports\\logs\\"

# ── Baseline fixture ──────────────────────────────────────────────────────────
# Set to "" on first run. After Reviewer APPROVEs, promote JSON to fixtures\.
baseline_fixture: "01_Data\\json\\fixtures\\kamiyanti_2025-11-11.json"

# ── Quality gates ─────────────────────────────────────────────────────────────
expected_fields_populated: 60
expected_zone_coverage:    60
max_allowed_warnings:       2

# ── Known permanent gaps (expected empty fields — not failures) ───────────────
permanent_gaps:
  - cj       # Kolagen Sendi not in PDF table rows
  - sk-jc    # same source as cj
  - mt-bmi   # Kegemukan is a section heading, not a data row
  - mt-wc    # Lingkar Pinggang not in PDF table rows
